AQAAAAADAAAAAAABAAACAAAAAgAAAAACAAABAQAAAAAAAAABAAAAAAAAAAAAAAIAAAAAAAAAAQAAAAABAAAAAAAAAAAAAAAAAAADAAAAAAAAAAAAAAADAAIAAQAAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAQEAAQAAAAEAAAEAAwAAAAAAAAAAAAAAAAAAAAEDAAAAAAAAAgADAAAAAAADAwACAAAAAAAAAQAAAAAAAAAAAAIAAAAAAAAAAgAAAAAAAAMAAAAAAAAAAQEAAgAAAAAAAAAAAAAAAAAAAAAAAAIAAAAAAAAAAAAAAAIAAAAAAwIAAAAAAAACAAAAAAMAAAAAAAAAAAACAgAAAAAAAAACAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAEAAAEAAAEDAAAAAgAAAAABAQAAAAIDAAABAAAAAAEAAwAAAAAAAAABAgAAAQAAAAAAAAAAAAAAAAAAAgAAAAMAAAAAAAAAAAAAAAAAAAIAAgAAAAAAAAAAAAAAAAAAAAIAAgAAAAAAAAAAAAAAAAMAAgAAAAEDAAIAAAAAAAAAAAMAAAMDAAAAAAIAAAAAAAAAAwACAAIAAAAAAwABAAMAAAAAAAAAAAAAAAAAAAADAAAAAAAAAAACAAIAAAAAAAAAAAAAAAAAAQAAAAAAAAACAAAAAAAAAAAAAAADAAAAAAAAAAEBAAACAAABAQAAAQAAAgAAAAAAAwIAAAAAAgABAAAAAAMAAAABAQMAAQAAAQIAAAECAAACAAAAAwAAAAAAAAMAAAAAAQAAAAEAAAADAAAAAAAAAAMAAAAAAAAAAAABAAIAAAIAAAAAAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAAAAMAAAAAAAAAAAAAAAADAwAAAQACAAAAAAAAAQAAAAAAAAAAAAAAAAADAQMAAAAAAAAAAwAAAAAAAAMAAAAAAAIAAgAAAAAAAAAAAAAAAAAAAAIBAQABAAIAAAAAAAAAAAAAAAABAAABAAAAAgAAAQAAAAACAAAAAAAAAAIAAAAAAAAAAwAAAAAAAAAAAAAAAgAAAAAAAAICAAAAAAAAAAAAAgAAAAAAAAABAgMAAAAAAAAAAAAAAAIAAAAAAAABAQIBAAAAAAAAAwAAAAAAAAACAAAAAgACAAAAAAAAAAAAAAAAAAIAAAAAAQAAAgABAAAAAAAAAAEDAAAAAAAAAAADAAIAAAAAAAABAQAAAAAAAAAAAAABAAIAAAAAAAAAAAAAAAIAAAAAAAAAAAACAAIAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAMAAQIDAAAAAAAAAAAAAAAAAAAAAQAAAwEAAAABAAAAAAEAAwAAAAIDAAAAAQAAAAAAAAAAAgAAAAAAAAAAAAAAAgICAAAAAQADAAACAAAAAAAAAAAAAAAAAwAAAAACAAAAAwAAAAAAAAAAAAEAAAAAAAAAAwAAAAIAAAACAAAAAAACAAAAAAEAAQAAAAADAAACAgAAAAAAAwACAAMAAAAAAAADAgADAAAAAAAAAAAAAAACAwEBAAAAAAAAAAAAAAIAAAEAAAAAAwAAAAMAAAACAgAAAAAAAAAAAAAAAAEAAwAAAAAAAQEAAAAAAAAAAAIBAAMAAAEAAAAAAAAAAAACAAMAAAAAAAAAAAAAAAAAAAAAAAAAAQAAAAACAAMAAAACAwADAAAAAAAAAAMAAAACAAADAAAAAAAAAQAAAAABAAAAAwAAAwEAAAMAAAAAAwIAAAAAAAAAAAIAAgAAAAMAAAAAAAIAAAAAAAICAAACAAABAAAAAgAAAAAAAAIAAQAAAAAAAAIAAAABAAAAAQAAAAAAAAEAAAACAQAAAAAAAAAAAgAAAAAAAwAAAAABAAIAAAAAAAAAAAAAAgAAAAADAAACAAAAAAEAAAAAAAAAAAECAAACAAAAAAAAAAAAAAAAAAAAAgIAAQAAAAAAAAAAAwEAAAMAAAAAAAADAAAAAAAAAQAAAQAAAAAAAAAAAAEAAgAAAAAAAAAAAAAAAAMAAgIAAwAAAAMDAAACAAAAAAAAAgAAAAEAAAAAAAAAAAAAAAAAAAADAAADAAAAAQAAAgAAAAAAAAAAAQAAAAEAAAAAAAAAAgAAAAAAAAEAAAAAAQAAAQEAAAEAAAAAAAAAAAEAAAAAAQAAAAAAAgAAAwAAAAAAAAAAAAAAAAADAAAAAgAAAAAAAAAAAAAAAAAAAAICAgAAAAAAAAAAAAAAAAAAAAACAAAAAAMAAAAAAAAAAAAAAAAAAAACAAAAAQAAAAEAAAAAAAAAAAAAAQMAAAAAAAAAAAAAAwEAAAAAAwAAAAAAAAEAAAACAAADAAACAAAAAAAAAAAAAAIAAAAAAwAAAAAAAAACAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAAAAAIAAAEAAAIAAAAAAAIAAAAAAAAAAwAAAAAAAAAAAAAAAAAAAAAAAAACAAAAAAACAwACAAMAAAEAAAAAAAEDAAEAAAAAAAABAQIAAAAAAwAAAAAAAgAAAAACAgAAAAAAAgAAAAABAAAAAAAAAAADAAACAwMAAAAAAAIAAAAAAwAAAAAAAAEAAAIAAAAAAAAAAQAAAAEAAwACAAEAAAAAAAACAAAAAAEAAAABAQAAAAEAAAAAAAAAAAA=';

/* ---------- particle counts / highway layout ---------- */
const N_TRUCK = SEMI_META.n;     // truck particles (baked offline)
const N_ROAD  = 65000;           // highway particles (structure from lane lines, not noise)
const N = N_TRUCK + N_ROAD;      // total = morph target count for the logo
const ROAD_START = N_TRUCK;      // index where road particles begin
// highway layout (world units; truck baked with bottom on the road at y=1.35)
const ROAD_L = 18.0, ROAD_W = 5.2, ROAD_Y = 1.35, ROAD_SPEED = 6.0;

function decodeSemi(){
  const n=SEMI_META.n, raw=atob(SEMI_B64);
  const bytes=new Uint8Array(n*8);
  for(let i=0;i<bytes.length;i++) bytes[i]=raw.charCodeAt(i);
  const q=new Int16Array(bytes.buffer,0,n*3);
  const cls=new Uint8Array(bytes.buffer,n*6,n);
  const wid=new Uint8Array(bytes.buffer,n*7,n);
  const mnv=SEMI_META.min, mxv=SEMI_META.max;
  const pos=new Float32Array(n*3), col=new Float32Array(n*3), wheel=new Float32Array(n*3);
  /* body silver / glass blue / chrome bright — matches the showcase viewer's finish */
  const BASE=[[0.796,0.812,0.827],[0.435,0.749,0.910],[0.910,0.925,0.937]];
  const LIFT=[0.933,0.957,0.973];
  for(let k=0;k<n;k++){
    for(let a=0;a<3;a++){ const j=k*3+a; pos[j]=mnv[a]+(q[j]+32768)/65535*(mxv[a]-mnv[a]); }
    const c=BASE[cls[k]]||BASE[0], t=Math.random()*0.4;
    col[k*3]  =c[0]+(LIFT[0]-c[0])*t;
    col[k*3+1]=c[1]+(LIFT[1]-c[1])*t;
    col[k*3+2]=c[2]+(LIFT[2]-c[2])*t;
    if(wid[k]>0){ const ax=SEMI_META.axles[wid[k]-1];
      wheel[k*3]=1; wheel[k*3+1]=ax[0]; wheel[k*3+2]=ax[1]; }
  }
  return {pos,col,wheel};
}

/* ---------- build truck cloud (baked in final world coords) ---------- */
const truckData=decodeSemi();
const truckShift={x:0,y:0,z:0};

/* ---------- build the highway (particles) ---------- */
const LANE=1.95;                 // dashed lane dividers → truck sits in the middle lane (3 lanes total)
function buildRoad(count){
  const pos=new Float32Array(count*3), col=new Float32Array(count*3);
  const period=4.0, dash=2.2, nd=Math.max(1,Math.floor(2*ROAD_L/period));
  const set=(k,x,z,jz,r,g,b)=>{ pos[k*3]=x; pos[k*3+1]=ROAD_Y+(Math.random()-0.5)*0.04; pos[k*3+2]=z+(Math.random()-0.5)*jz; col[k*3]=r; col[k*3+1]=g; col[k*3+2]=b; };
  for(let k=0;k<count;k++){ const r=Math.random();
    if(r<0.40){          // dim asphalt surface — a subtle band, not bright noise
      set(k, Math.random()*2*ROAD_L-ROAD_L, (Math.random()*2-1)*ROAD_W, 0,
          0.10+Math.random()*0.03, 0.105+Math.random()*0.03, 0.11+Math.random()*0.03);
    } else if(r<0.72){   // two crisp DASHED lane dividers (heavy → clear structure)
      const side=(Math.random()<0.5?LANE:-LANE);
      const di=(Math.random()*nd)|0, x=-ROAD_L+di*period+Math.random()*dash;
      set(k, x, side, 0.09, 0.9,0.92,0.94);
    } else {             // two crisp solid edge lines
      const z=(Math.random()<0.5?ROAD_W*0.97:-ROAD_W*0.97);
      set(k, Math.random()*2*ROAD_L-ROAD_L, z, 0.07, 0.86,0.88,0.9);
    }
  }
  return {pos,col};
}
const roadData=buildRoad(N_ROAD);

/* ---------- combine truck + road into one source buffer ---------- */
const srcPos=new Float32Array(N*3), srcCol=new Float32Array(N*3);
srcPos.set(truckData.pos,0);  srcPos.set(roadData.pos, N_TRUCK*3);
srcCol.set(truckData.col,0);  srcCol.set(roadData.col, N_TRUCK*3);

/* ---------- wheel particles (tagged from the actual wheel meshes only) ---------- */
const R_W=0.82;   // baked semi tire radius
const isWheel=new Uint8Array(N), wcx=new Float32Array(N), wcy=new Float32Array(N);
for(let k=0;k<N_TRUCK;k++){ const i=k*3;
  if(truckData.wheel[i]>0.5){ isWheel[k]=1;
    wcx[k]=truckData.wheel[i+1]+truckShift.x; wcy[k]=truckData.wheel[i+2]+truckShift.y; } }

/* ---------- logo: the official Streamax PNG (embedded as a data URI) ----------
   Sampled to particles AND shown crisp for the finale, from the same image,
   so they overlap exactly. Embedded so pixel-sampling works from file://.   */
let logoData=null, cloud=null, posAttr=null, colAttr=null, turb=null, logoPlane=null;
const LOGO_W=16.0, LOGO_Y=4.0;
const _img=new Image();
_img.onload=()=>{
  const cw=_img.naturalWidth, ch=_img.naturalHeight;
  const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
  const g=cv.getContext('2d'); g.drawImage(_img,0,0);
  const imgData=g.getImageData(0,0,cw,ch);
  const data=imgData.data;
  const gold=[231,189,98], cream=[246,229,184], purple=[146,114,242];
  const mix=(a,b,t)=>a+(b-a)*t;
  for(let j=0;j<ch;j++) for(let i=0;i<cw;i++){ const idx=(j*cw+i)*4;
    if(data[idx+3]>0){
      const t=i/Math.max(1,cw-1);
      const local=t<0.58 ? t/0.58 : (t-0.58)/0.42;
      const a=t<0.58 ? gold : cream;
      const b=t<0.58 ? cream : purple;
      data[idx]=mix(a[0],b[0],local);
      data[idx+1]=mix(a[1],b[1],local);
      data[idx+2]=mix(a[2],b[2],local);
    }
  }
  g.putImageData(imgData,0,0);
  // sample the non-transparent pixels (the letterforms)
  const px=[],py=[],pr=[],pg=[],pb=[];
  for(let j=0;j<ch;j++) for(let i=0;i<cw;i++){ const idx=(j*cw+i)*4;
    if(data[idx+3]>110){ px.push(i); py.push(j); pr.push(data[idx]/255); pg.push(data[idx+1]/255); pb.push(data[idx+2]/255); } }
  const total=px.length, s=LOGO_W/cw;
  const pos=new Float32Array(N*3), col=new Float32Array(N*3);
  for(let k=0;k<N;k++){ const r=(Math.random()*total)|0;
    pos[k*3]   = (px[r]-cw/2)*s;
    pos[k*3+1] = -(py[r]-ch/2)*s + LOGO_Y;          // image-centre mapping → exact plane overlap
    pos[k*3+2] = 0;                                  // flat 2D
    col[k*3]=pr[r]; col[k*3+1]=pg[r]; col[k*3+2]=pb[r]; }
  logoData={pos,col};
  // crisp finale plane from the same image
  const tex=new THREE.CanvasTexture(cv); tex.colorSpace=THREE.SRGBColorSpace;
  tex.anisotropy=Math.min(8, renderer.capabilities.getMaxAnisotropy());
  logoPlane=new THREE.Mesh(new THREE.PlaneGeometry(LOGO_W, ch*(LOGO_W/cw)),
    new THREE.MeshBasicMaterial({ map:tex, transparent:true, opacity:0, depthWrite:false, fog:false }));
  logoPlane.position.set(0,LOGO_Y,0); logoPlane.visible=false; scene.add(logoPlane);
  initCloud();
};
_img.onerror=()=>{ document.getElementById('loading').textContent='Could not load logo image.'; };
_img.src=STREAMAX_LOGO_DATAURL;

/* ============================================================
   Particle cloud + scroll morph
   ============================================================ */
function initCloud(){
  turb=new Float32Array(N*3);
  for(let i=0;i<N*3;i+=3){ const v=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize().multiplyScalar(0.6+Math.random()*1.6);
    turb[i]=v.x; turb[i+1]=v.y; turb[i+2]=v.z; }
  const g=new THREE.BufferGeometry();
  posAttr=new THREE.BufferAttribute(new Float32Array(srcPos),3);
  colAttr=new THREE.BufferAttribute(new Float32Array(srcCol),3);
  g.setAttribute('position', posAttr); g.setAttribute('color', colAttr);
  cloud=new THREE.Points(g, new THREE.PointsMaterial({ size:1, vertexColors:true, sizeAttenuation:false,
    transparent:true, opacity:1.0, depthWrite:false, depthTest:true, blending:THREE.AdditiveBlending }));
  scene.add(cloud);
  document.getElementById('loading').style.display='none';
  updateAll(0,0,0);
}
const RL2=ROAD_L*2;
const wrapX=(x)=>{ x=(x+ROAD_L)%RL2; if(x<0) x+=RL2; return x-ROAD_L; };
// per-particle animated SOURCE position: road scrolls (−scroll), wheels spin (angle), truck else static
function srcAt(k,i,sp,scroll,ca,sa,out){
  if(k>=ROAD_START){ out[0]=wrapX(sp[i]-scroll); out[1]=sp[i+1]; out[2]=sp[i+2]; }
  else if(isWheel[k]){ const dx=sp[i]-wcx[k], dy=sp[i+1]-wcy[k];
    out[0]=wcx[k]+dx*ca-dy*sa; out[1]=wcy[k]+dx*sa+dy*ca; out[2]=sp[i+2]; }
  else { out[0]=sp[i]; out[1]=sp[i+1]; out[2]=sp[i+2]; }
}
const _s=[0,0,0];
// full update: animated source (flowing road + spinning wheels) → logo, with scattering billow
function updateAll(m, scroll, angle){
  const sp=srcPos, sc=srcCol, lp=logoData.pos, lc=logoData.col, pa=posAttr.array, ca=colAttr.array;
  const mm=Math.min(Math.max(m,0),1), inv=1-mm;
  const taper=mm<0.7?1:Math.max(0,1-(mm-0.7)/0.3);
  const billow=Math.sin(Math.PI*mm)*0.8*taper;     // gentler scatter → cleaner transit
  const cw=Math.cos(angle), sw=Math.sin(angle);
  for(let k=0;k<N;k++){ const i=k*3;
    srcAt(k,i,sp,scroll,cw,sw,_s);
    pa[i]  = _s[0]*inv + lp[i]*mm   + turb[i]*billow;
    pa[i+1]= _s[1]*inv + lp[i+1]*mm + turb[i+1]*billow;
    pa[i+2]= _s[2]*inv + lp[i+2]*mm + turb[i+2]*billow;
    ca[i]  = sc[i]*inv   + lc[i]*mm;
    ca[i+1]= sc[i+1]*inv + lc[i+1]*mm;
    ca[i+2]= sc[i+2]*inv + lc[i+2]*mm;
  }
  posAttr.needsUpdate=true; colAttr.needsUpdate=true;
}
// light update (no morph): only the moving parts — flowing road + spinning wheels
function updateTravel(scroll, angle){
  const sp=srcPos, pa=posAttr.array, cw=Math.cos(angle), sw=Math.sin(angle);
  for(let k=ROAD_START;k<N;k++){ const i=k*3; pa[i]=wrapX(sp[i]-scroll); }
  for(let k=0;k<N_TRUCK;k++){ if(!isWheel[k]) continue; const i=k*3;
    const dx=sp[i]-wcx[k], dy=sp[i+1]-wcy[k];
    pa[i]=wcx[k]+dx*cw-dy*sw; pa[i+1]=wcy[k]+dx*sw+dy*cw; }
  posAttr.needsUpdate=true;
}

/* ---------- camera key positions ---------- */
const TOP =new THREE.Vector3(0,25,4);     // overhead; truck nose points UP (camera up = +X)
const SIDE=new THREE.Vector3(0,4.5,18);
const LOGO=new THREE.Vector3(0,4.0,15);   // head-on so the flat 2D wordmark reads square
const TARGET=new THREE.Vector3(0,4.0,0);
// camera "up" rolls from +X (nose-up top view) to +Y (nose-right side view)
const UP_TOP=new THREE.Vector3(1,0,0);
const UP_SIDE=new THREE.Vector3(0,1,0);
const _up=new THREE.Vector3();
const smooth=x=>x*x*(3-2*x);
const clamp01=x=>Math.min(1,Math.max(0,x));

/* ---------- scroll progress ---------- */
let targetP=0, curP=0, lastM=-1, roadScroll=0, travelling=false, lastT=0, externalProgress=false;
function readScroll(){
  if(externalProgress) return;
  const max=document.body.scrollHeight-innerHeight;
  targetP = max>0 ? clamp01(scrollY/max) : 0;
}
addEventListener('message', (event)=>{
  const data=event.data||{};
  if(data.type==='streamaxMorphReset'){ externalProgress=true; targetP=0; curP=0; needsFit=true; return; }
  if(data.type!=='streamaxMorphProgress') return;
  externalProgress=true;
  targetP=clamp01(Number(data.progress)||0);
});
addEventListener('scroll', ()=>{
  readScroll();
  const h=document.getElementById('hint');
  if(h) h.style.opacity = scrollY>40?0:1;
});
readScroll();

const capEl=document.getElementById('capText'), barEl=document.getElementById('bar');
const guardianCopy=document.getElementById('guardianCopy'), solutionCopy=document.getElementById('solutionCopy');
function smoothRange(start,end,value){
  const t=clamp01((value-start)/Math.max(0.0001,end-start));
  return t*t*(3-2*t);
}
function updateCopy(p){
  const guardian=smoothRange(0.06,0.22,p)*(1-smoothRange(0.34,0.46,p));
  const solution=smoothRange(0.36,0.48,p)*(1-smoothRange(0.70,0.84,p));
  if(guardianCopy){
    guardianCopy.style.opacity=guardian.toFixed(4);
    guardianCopy.style.transform='translate3d(0,'+((1-guardian)*26).toFixed(2)+'px,0)';
  }
  if(solutionCopy){
    solutionCopy.style.opacity=solution.toFixed(4);
    solutionCopy.style.transform='translate3d(0,'+((1-solution)*26).toFixed(2)+'px,0)';
  }
}
function caption(p){
  let t = p<0.33 ? 'On the highway' : p<0.68 ? 'Best AI solutions provider' : p<0.92 ? 'Particles in transit' : 'We are Streamax';
  if(capEl && capEl.textContent!==t) capEl.textContent=t;
  if(barEl) barEl.style.width=(p*100).toFixed(1)+'%';
}

/* ---------- render loop ---------- */
const _cp=new THREE.Vector3();
// Re-fit the renderer to the viewport whenever the canvas may have changed
// size. Critically this covers the Welcome tab being hidden (display:none)
// and shown again: the `resize` event does NOT fire for display changes, so
// without this the drawing buffer stays at its hidden (0) size and gets
// CSS-upscaled → blurry. A ResizeObserver (below) flags needsFit on the
// 0→full transition; the next frame restores full resolution.
let needsFit=true, lastFitW=0, lastFitH=0;
function fitRenderer(){
  if(innerWidth>0 && innerHeight>0){
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(innerWidth,innerHeight);
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    lastFitW=innerWidth; lastFitH=innerHeight; needsFit=false;
  }
}
function animate(t){
  requestAnimationFrame(animate);
  // Re-fit whenever the viewport size/aspect changed since the last fit (covers
  // display:none -> block after finishing + returning to Welcome, where a stale
  // camera.aspect otherwise squishes the truck into a thin vertical streak).
  if(needsFit || innerWidth!==lastFitW || innerHeight!==lastFitH) fitRenderer();
  const dt=Math.min(0.05,(t-lastT)/1000||0); lastT=t;
  curP += (targetP-curP)*0.09;
  const aP=smooth(clamp01(curP/0.38));       // top → horizontal side view
  const bP=smooth(clamp01((curP-0.68)/0.32)); // hold side view, then dissipate → logo
  _cp.lerpVectors(TOP, SIDE, aP).lerp(LOGO, bP);
  _up.lerpVectors(UP_TOP, UP_SIDE, aP).normalize();    // roll nose-up → nose-right
  camera.up.copy(_up);
  camera.position.copy(_cp); camera.lookAt(TARGET);
  // PARTICLES: the highway ALWAYS flows + wheels ALWAYS spin; the morph blends source → logo on top,
  // so the road keeps streaming left right through the transition (no sudden stop).
  if(cloud){
    roadScroll += dt*ROAD_SPEED;
    const angle = -roadScroll/R_W;             // wheel spin matches distance travelled
    if(bP<0.004){ updateTravel(roadScroll, angle); lastM=0; }   // idle cruise (cheap)
    else { updateAll(bP, roadScroll, angle); lastM=bP; }         // morph (flow continues underneath)
  }
  // FINALE: crisp logo develops AS the particles converge (no grainy plateau),
  // then particles dissolve out for the clean finish.
  if(cloud){
    const fin=smooth(clamp01((bP-0.72)/0.28));   // tied to morph convergence
    if(logoPlane){ logoPlane.material.opacity=fin; logoPlane.visible=fin>0.001; }
    cloud.material.opacity=0.95*(1-fin*fin);      // points linger to guide the form, then fade
    cloud.visible=fin<0.997;
  }
  caption(curP);
  updateCopy(curP);
  renderer.render(scene,camera);
}
animate();

try{ renderer.domElement.addEventListener('webglcontextrestored', ()=>{ needsFit=true; }, false); }catch(e){}
} /* end stmxMain */

/* ---------- CDN-resilient bootstrap ----------
   Stage 1 races a global CDN against a China-friendly mirror; stage 2 adds
   two more mirrors; if everything fails we show a static logo instead of
   hanging on "Assembling particles…" forever. */
(function bootstrap(){
  var started=false, succeeded=false;
  function ok(){
    if(started||!window.THREE) return;
    started=true;
    try{ stmxMain(); succeeded=true; }catch(e){ fail(); }
  }
  function fail(){
    if(succeeded) return;
    var l=document.getElementById('loading'); if(l) l.style.display='none';
    var img=new Image(); img.src=STREAMAX_LOGO_DATAURL; img.alt='Streamax';
    img.style.cssText='position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(46vw,520px);opacity:0.92;';
    document.body.appendChild(img);
  }
  function stage(urls,next){
    if(started) return;
    var pending=urls.length;
    var timer=setTimeout(function(){ if(!started) next(); },9000);
    urls.forEach(function(u){
      var s=document.createElement('script');
      s.src=u; s.async=true;
      s.onload=function(){ ok(); if(!started&&--pending===0){ clearTimeout(timer); next(); } };
      s.onerror=function(){ s.remove(); if(!started&&--pending===0){ clearTimeout(timer); next(); } };
      document.head.appendChild(s);
    });
  }
  stage([
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.159.0/three.min.js',
    'https://registry.npmmirror.com/three/0.159.0/files/build/three.min.js'
  ],function(){
    stage([
      'https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js',
      'https://unpkg.com/three@0.159.0/build/three.min.js'
    ],fail);
  });
})();
</script>
